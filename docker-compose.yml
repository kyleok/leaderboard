services:
  leaderboard:
    build: .
    container_name: leaderboard
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - BASE_URL=${BASE_URL:-http://localhost:8085}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - leaderboard-data:/app/data
      - /home/rlagkdus705/celebvhq_ref:/app/data/references/celebvhq:ro
      - ./templates:/app/templates
      - ./static:/app/static
    runtime: nvidia

  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin1234
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n-data:/home/node/.n8n

volumes:
  leaderboard-data:
  n8n-data:
