services:
  leaderboard:
    build: .
    container_name: leaderboard
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - BASE_URL=${BASE_URL:-http://localhost:8085}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - leaderboard-data:/app/data
      - /home/rlagkdus705/celebvhq_ref:/app/data/references/celebvhq:ro
      - ./templates:/app/templates
      - ./static:/app/static
    # GPU support: requires nvidia-container-toolkit
    # Uncomment for GPU-accelerated metrics (FID, IS, etc.)
    runtime: nvidia

volumes:
  leaderboard-data:
