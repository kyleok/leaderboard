{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block header_right %}
<div id="theme-toggle-container"></div>
<script>
    if (window.__laitTheme) window.__laitTheme.injectToggle(document.getElementById('theme-toggle-container'));
</script>
{% endblock %}

{% block head %}
<style>
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; max-width: 400px; width: 100%; box-shadow: 0 2px 20px rgba(255,111,15,0.08); }
    .login-card h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 28px; font-weight: 600; margin-bottom: 8px; color: var(--espresso); }
    .login-card p { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .login-card label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    .login-card input[type="password"] { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; background: var(--bg); color: var(--text); box-sizing: border-box; }
    .login-card input[type="password"]:focus { border-color: var(--accent); outline: none; }
    .login-card .btn { width: 100%; justify-content: center; margin-top: 16px; }
    .login-error { color: var(--danger); font-size: 13px; margin-top: 8px; }
</style>
{% endblock %}

{% block content %}
<main>
    <div class="login-card">
        <h1>Admin Login</h1>
        <p>Enter the admin password to access the management panel.</p>
        <form method="POST" action="/admin/login">
            <input type="hidden" name="redirect" value="{{ redirect }}">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autofocus>
            {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
    </div>
</main>
{% endblock %}
